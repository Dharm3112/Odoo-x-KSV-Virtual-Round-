version: '3.8'

services:
  # ====== PostgreSQL Database ======
  postgres:
    image: postgres:16.1-alpine
    container_name: vendorbridge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vendorbridge
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U db_user -d vendorbridge']
      interval: 5s
      timeout: 5s
      retries: 5

  # ====== Redis Cache & Queue Backend ======
  redis:
    image: redis:7.2.4-alpine
    container_name: vendorbridge_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ====== MinIO Object Storage (S3 Compatible) ======
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-40-50Z
    container_name: vendorbridge_minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - miniodata:/data
    command: server /data --console-address ':9001'

  # ====== MailDev Local SMTP Interceptor ======
  maildev:
    image: maildev/maildev:2.1.0
    container_name: vendorbridge_maildev
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP server
      - '1080:1080'   # Web UI to view captured emails

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local
