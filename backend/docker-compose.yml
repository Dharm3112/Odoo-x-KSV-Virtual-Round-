services:
  postgres:
    image: postgres:16.1-alpine
    container_name: vendorbridge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vendorbridge}
      POSTGRES_USER: ${POSTGRES_USER:-db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-db_user} -d ${POSTGRES_DB:-vendorbridge}']
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p0
    container_name: vendorbridge_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vendorbridge}
      DB_USER: ${POSTGRES_USER:-db_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: plain
    ports:
      - '${PGBOUNCER_HOST_PORT:-6433}:5432'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-db_user}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.4-alpine
    container_name: vendorbridge_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: vendorbridge_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_password}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-01-31T08-59-40Z
    container_name: vendorbridge_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio_admin} ${S3_SECRET_KEY:-minio_password};
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-vendorbridge-bucket};
      mc anonymous set none local/${S3_BUCKET_NAME:-vendorbridge-bucket};
      "
    restart: 'no'

  maildev:
    image: maildev/maildev:2.1.0
    container_name: vendorbridge_maildev
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '1080:1080'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:1080']
      interval: 5s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4.3
    container_name: vendorbridge_clamav
    restart: unless-stopped
    ports:
      - '3310:3310'
    volumes:
      - clamdata:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', "printf 'PING\\n' | nc 127.0.0.1 3310 | grep PONG"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamdata:
